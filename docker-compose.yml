# Local dev parity. The Firebase emulators are run via the Firebase CLI
# (`pnpm emulators`) rather than Docker, since the CLI manages the emulator suite.
# This compose file builds/runs the NestJS api against those emulators.
services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    environment:
      # Point the Admin SDK at host-run emulators.
      FIRESTORE_EMULATOR_HOST: host.docker.internal:8080
      FIREBASE_AUTH_EMULATOR_HOST: host.docker.internal:9099
      FIREBASE_STORAGE_EMULATOR_HOST: host.docker.internal:9199
      API_PORT: 4000
    ports:
      - '4000:4000'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
