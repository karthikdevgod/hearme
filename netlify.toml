# ───────────────────────────────────────────────────────────────────
# Netlify deployment for the HearMe WEB app (Next.js) only.
# The NestJS API (apps/api) is NOT deployed here — it runs on Render.
#
# `base` makes Netlify treat apps/web as the site root: it runs install
# and build there, and the Next.js runtime plugin finds next.config.mjs.
# pnpm resolves the workspace (root pnpm-workspace.yaml + lockfile) upward,
# so @hearme/shared / @hearme/config install correctly.
# ───────────────────────────────────────────────────────────────────
[build]
  base = "apps/web"
  # Production build — NEVER `pnpm run dev` (the dev server never exits and the build hangs).
  command = "pnpm run build"

[build.environment]
  # Pin Node (repo targets 22; avoids Netlify picking a too-new default).
  NODE_VERSION = "22"

# Netlify's official Next.js runtime: serves SSR / route handlers as functions
# and handles the publish dir automatically — do not set `publish` manually.
[[plugins]]
  package = "@netlify/plugin-nextjs"
