# Render deployment for the NestJS api. (Railway works equivalently via the Dockerfile.)
services:
  - type: web
    name: hearme-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: 4000
      # Secrets (OPENAI_API_KEY, ELEVENLABS_API_KEY, STRIPE_*, FIREBASE_*) set in dashboard.
